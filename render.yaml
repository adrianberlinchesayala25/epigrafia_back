services:
  - type: web
    name: epigrafia-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 8000
    plan: free
    autoDeploy: true

